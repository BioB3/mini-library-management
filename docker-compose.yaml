services:
  db:
    image: postgres:alpine
    container_name: library_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minilibrary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: MiniLibrary/src/MiniLibrary.Web/Dockerfile
    container_name: library_backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AppDb=Host=db;Port=5432;Database=minilibrary;Username=postgres;Password=postgres
    depends_on:
      - db

volumes:
  postgres_data: